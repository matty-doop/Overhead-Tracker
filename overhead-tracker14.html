<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Overhead</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d16;
    --bg2:#0d1220;
    --ink:#eef1f8;
    --ink-dim:#8790ab;
    --ink-faint:#4d5670;
    --line:rgba(255,255,255,.08);
    --line-soft:rgba(255,255,255,.05);
    --chrome:#5eead4;
    --accent:#5b8def;      /* overwritten per-airline at runtime */
    --panel:rgba(255,255,255,.035);
    --panel-border:rgba(255,255,255,.09);
    --radius:20px;
    --disp:'Space Grotesk', system-ui, sans-serif;
    --mono:'JetBrains Mono', ui-monospace, monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(120% 90% at 18% -10%, color-mix(in srgb, var(--accent) 16%, transparent), transparent 55%),
      radial-gradient(100% 80% at 100% 110%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 60%),
      linear-gradient(180deg, var(--bg2), var(--bg));
    background-attachment:fixed;
    color:var(--ink);
    font-family:var(--mono);
    overflow:hidden;
    transition:background 1.1s ease;
  }
  :focus-visible{outline:2px solid var(--chrome); outline-offset:2px; border-radius:4px;}

  /* ---------- app shell ---------- */
  #app{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    padding:3.4vmin 4vmin 2.4vmin;
  }

  /* eyebrow row */
  #eyebrow{
    display:flex; align-items:center; justify-content:space-between;
    font-size:2.1vmin; letter-spacing:.16em; text-transform:uppercase;
    color:var(--ink-faint);
  }
  #eyebrow .tag{display:flex; align-items:center; gap:.9ch;}
  #eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--chrome);
    box-shadow:0 0 6px var(--chrome);}
  #clock{color:var(--ink-dim); letter-spacing:.08em;}
  #gearBtn{
    background:none;border:1px solid var(--line);color:var(--ink-dim);
    width:4.2vmin;height:4.2vmin;border-radius:50%;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  #gearBtn svg{width:52%;height:52%;}
  #gearBtn:active{background:var(--panel);}

  /* main stage */
  #stage{
    flex:1; display:flex; align-items:center; gap:4.5vmin; min-height:0;
  }
  #dialWrap{
    flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:1vmin;
  }
  #dial{ width:19vmin; height:19vmin; }
  #dialWrap .dialLabel{ font-size:1.6vmin; letter-spacing:.14em; color:var(--ink-faint); text-transform:uppercase; }

  #content{ flex:1; min-width:0; display:flex; flex-direction:column; gap:2.6vmin; }

  #ident{ display:flex; align-items:baseline; gap:2vmin; flex-wrap:wrap; }
  #airlineName{
    font-family:var(--disp); font-weight:700; font-size:7.4vmin;
    letter-spacing:-.01em; color:var(--ink); line-height:1;
    transition:opacity .25s ease;
  }
  #flightNo{
    font-family:var(--mono); font-weight:600; font-size:2.9vmin;
    color:var(--accent); letter-spacing:.04em;
    padding:.35vmin 1.2vmin; border:1px solid var(--panel-border);
    border-radius:999px; background:var(--panel);
  }
  #acType{ font-size:2.5vmin; color:var(--ink-dim); letter-spacing:.02em; }

  /* route strip */
  #route{ display:flex; align-items:center; gap:2.2vmin; }
  .apt{ font-family:var(--disp); font-weight:600; font-size:5.6vmin; color:var(--ink); }
  .apt.dim{ color:var(--ink-faint); }
  #routeLine{
    flex:1; position:relative; height:2px; background:var(--line);
    border-radius:2px; min-width:8vmin;
  }
  #routeLine::before, #routeLine::after{
    content:""; position:absolute; top:50%; width:6px;height:6px;
    background:var(--ink-faint); border-radius:50%; transform:translateY(-50%);
  }
  #routeLine::before{ left:-3px; }
  #routeLine::after{ right:-3px; }
  #planeGlyph{
    position:absolute; top:50%; left:38%; transform:translate(-50%,-50%);
    width:2.6vmin; height:2.6vmin; color:var(--accent);
    filter:drop-shadow(0 0 6px color-mix(in srgb, var(--accent) 60%, transparent));
  }

  /* telemetry */
  #stats{ display:flex; gap:2.6vmin; flex-wrap:wrap; }
  .stat{ display:flex; flex-direction:column; gap:.4vmin; }
  .stat .val{
    font-family:var(--mono); font-weight:600; font-size:4vmin; color:var(--ink);
    font-variant-numeric:tabular-nums;
  }
  .stat .val .unit{ font-size:.5em; color:var(--ink-dim); margin-left:.3ch; font-weight:400;}
  .stat .lbl{ font-size:1.7vmin; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); }

  /* footer meta */
  #metaRow{
    display:flex; align-items:center; justify-content:space-between;
    font-size:1.9vmin; color:var(--ink-faint); letter-spacing:.04em;
    padding-top:1.6vmin; border-top:1px solid var(--line-soft);
  }
  #metaRow .dots{ display:flex; gap:.8vmin; }
  #metaRow .dots span{ width:6px;height:6px;border-radius:50%; background:var(--ink-faint); }
  #metaRow .dots span.on{ background:var(--accent); }

  /* empty / status states */
  #statusLine{ font-size:2.6vmin; color:var(--ink-dim); }
  #statusLine.warn{ color:#f2b45c; }

  @media (max-width:820px){
    #stage{ flex-direction:column; align-items:flex-start; gap:2.6vmin; }
    #dialWrap{ flex-direction:row; }
    #dial{ width:15vmin; height:15vmin; }
    #airlineName{ font-size:8.6vmin; }
    .apt{ font-size:6.6vmin; }
  }

  @media (prefers-reduced-motion: reduce){
    body{ transition:none; }
    #airlineName{ transition:none; }
    #needle{ transition:none !important; }
  }

  /* ---------- settings sheet ---------- */
  #overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.5); opacity:0; pointer-events:none;
    transition:opacity .2s ease; z-index:90;
  }
  #overlay.open{ opacity:1; pointer-events:auto; }
  #sheet{
    position:fixed; inset:auto 0 0 0; z-index:100;
    background:#0d1120; border-top:1px solid var(--panel-border);
    border-radius:20px 20px 0 0;
    padding:3vmin 4vmin calc(env(safe-area-inset-bottom,0) + 3.4vmin);
    transform:translateY(105%); transition:transform .28s cubic-bezier(.2,.8,.2,1);
    max-height:82vh; overflow-y:auto;
    font-family:var(--mono);
  }
  #sheet.open{ transform:translateY(0); }
  #sheet h2{
    font-family:var(--disp); font-size:2.6vmin; letter-spacing:.06em;
    color:var(--ink); margin-bottom:2.4vmin; display:flex; align-items:center; justify-content:space-between;
  }
  #sheet h2 button{
    background:none;border:none;color:var(--ink-dim); font-size:2.4vmin; cursor:pointer;
  }
  .field{ margin:2.2vmin 0; }
  .field label{
    display:block; font-size:1.7vmin; letter-spacing:.12em; text-transform:uppercase;
    color:var(--ink-faint); margin-bottom:1vmin;
  }
  .field .row{ display:flex; gap:1.4vmin; align-items:center; flex-wrap:wrap; }
  input[type=range]{ flex:1; min-width:140px; accent-color:var(--chrome); }
  #radiusVal{ color:var(--ink); font-size:1.9vmin; min-width:8ch; }
  input[type=text]{
    background:#151a2c; border:1px solid var(--panel-border); color:var(--ink);
    font-family:var(--mono); font-size:1.9vmin; padding:1.2vmin 1.6vmin;
    border-radius:10px; flex:1; min-width:180px;
  }
  button.btn{
    font-family:var(--mono); font-size:1.8vmin; letter-spacing:.04em;
    background:var(--panel); color:var(--ink); border:1px solid var(--panel-border);
    padding:1.2vmin 2.2vmin; border-radius:10px; cursor:pointer;
  }
  button.btn:active{ background:rgba(255,255,255,.08); }
  button.btn.primary{ background:var(--chrome); color:#06231f; border-color:var(--chrome); font-weight:600; }
  .btnrow{ display:flex; gap:1.2vmin; flex-wrap:wrap; margin-top:1vmin; }
  #diag{
    margin-top:2.4vmin; padding:1.8vmin 2vmin; border:1px solid var(--line-soft); border-radius:12px;
    font-size:1.6vmin; line-height:1.7; color:var(--ink-dim); white-space:pre-line;
  }
</style>
</head>
<body>

<div id="app">
  <div id="eyebrow">
    <div class="tag"><span class="dot"></span> Overhead</div>
    <div style="display:flex;align-items:center;gap:2.4vmin;">
      <span id="clock">--:--</span>
      <button id="gearBtn" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="stage">
    <div id="dialWrap">
      <svg id="dial" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="none" stroke="var(--line)" stroke-width="1.5"/>
        <circle cx="50" cy="50" r="46" fill="none" stroke="var(--panel-border)" stroke-width="1" stroke-dasharray="1 11.5" stroke-dashoffset="0" transform="rotate(-90 50 50)"/>
        <text x="50" y="12" text-anchor="middle" fill="var(--ink-faint)" font-family="JetBrains Mono" font-size="7">N</text>
        <text x="88" y="53" text-anchor="middle" fill="var(--ink-faint)" font-family="JetBrains Mono" font-size="7">E</text>
        <text x="50" y="93" text-anchor="middle" fill="var(--ink-faint)" font-family="JetBrains Mono" font-size="7">S</text>
        <text x="12" y="53" text-anchor="middle" fill="var(--ink-faint)" font-family="JetBrains Mono" font-size="7">W</text>
        <g id="needle" style="transform-origin:50px 50px; transition:transform .8s cubic-bezier(.3,.9,.2,1);">
          <line x1="50" y1="50" x2="50" y2="14" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="50" cy="50" r="3.4" fill="var(--accent)"/>
        </g>
      </svg>
      <div class="dialLabel" id="dialLabel">Heading</div>
    </div>

    <div id="content">
      <div id="ident">
        <div id="airlineName">Overhead</div>
        <div id="flightNo" style="display:none;"></div>
      </div>
      <div id="acType"></div>

      <div id="route" style="display:none;">
        <div class="apt" id="depApt">—</div>
        <div id="routeLine">
          <svg id="planeGlyph" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22 12l-8-4V3.5a1.5 1.5 0 0 0-3 0V8l-8 4v2l8-2.5V17l-2.5 1.8V20l3.5-1 3.5 1v-1.2L13 17v-5.5l8 2.5v-2z"/>
          </svg>
        </div>
        <div class="apt dim" id="arrApt">—</div>
      </div>

      <div id="statusLine" style="display:none;"></div>

      <div id="stats" style="display:none;">
        <div class="stat"><div class="val" id="altVal">--<span class="unit">ft</span></div><div class="lbl">Altitude</div></div>
        <div class="stat"><div class="val" id="spdVal">--<span class="unit">mph</span></div><div class="lbl">Speed</div></div>
        <div class="stat"><div class="val" id="vsVal">--<span class="unit">ft/s</span></div><div class="lbl">Vert. rate</div></div>
      </div>
    </div>
  </div>

  <div id="metaRow">
    <span id="metaText">Waiting for location…</span>
    <div class="dots" id="metaDots"></div>
  </div>
</div>

<div id="overlay"></div>
<div id="sheet">
  <h2>Settings <button id="closeBtn" aria-label="Close">✕</button></h2>

  <div class="field">
    <label>Search radius</label>
    <div class="row">
      <input type="range" id="radius" min="5" max="100" step="5" value="30">
      <span id="radiusVal">30 nm</span>
    </div>
  </div>

  <div class="field">
    <label>Location</label>
    <div class="row">
      <input type="text" id="latlon" placeholder="lat, lon">
      <button class="btn" id="useGps">Use GPS</button>
    </div>
  </div>

  <div class="btnrow">
    <button class="btn primary" id="refreshBtn">Refresh now</button>
    <button class="btn" id="fsBtn">Fullscreen</button>
  </div>

  <div id="diag">No data yet.</div>
</div>

  AMX:{c:"#6b93ff",iata:"AM"}, VOI:{c:"#b58cf0",iata:"Y4"}, CMP:{c:"#6b93ff",iata:"CM"},
  AVA:{c:"#ff6b6b",iata:"AV"}, LAN:{c:"#ff7a9c",iata:"LA"},
  MXY:{c:"#2ed0d9",iata:"MX"}, VXP:{c:"#ff9a4d",iata:"XP"}, JSX:{c:"#ff5b6a",iata:"XE"},
  KAP:{c:"#5cb4ff",iata:"9K"}
};
const REGIONAL_PARENT = {
  GJS:"UAL", AWI:"UAL", EDV:"DAL", JIA:"AAL", ENY:"AAL", PDT:"AAL", QXE:"ASA"
};
function brandPrefix(cs){
  if(!cs) return null;
  const p = cs.trim().slice(0,3).toUpperCase();
  return REGIONAL_PARENT[p] || p;
}
function airlineName(cs){
  if(!cs) return null;
  return AIRLINES[brandPrefix(cs)] || null;
}
function typeName(t){
  if(!t) return null;
  return TYPES[t.toUpperCase()] || t.toUpperCase();
}
function flightNumber(cs){
  if(!cs) return null;
  const m = cs.match(/^([A-Z]{3})(\d.*)$/);
  const style = m && AIRLINE_STYLE[m[1]];
  return (m && style && style.iata) ? style.iata + m[2] : cs;
}
function accentFor(cs){
  const style = AIRLINE_STYLE[brandPrefix(cs)];
  return (style && style.c) || "#5b8def";
}

/* ================= helpers ================= */
function fmtAlt(ft){
  if(ft==="ground") return "GND";
  if(ft==null) return "--";
  if(ft < 1000) return String(ft);
  return (ft/1000).toFixed(1).replace(/\.0$/,"")+"k";
}
function nmBetween(lat1,lon1,lat2,lon2){
  const R=3440.065, toR=Math.PI/180;
  const dLat=(lat2-lat1)*toR, dLon=(lon2-lon1)*toR;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*toR)*Math.cos(lat2*toR)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ================= data fetch ================= */
async function fetchJSON(url, ms=8000){
  const c = new AbortController();
  const t = setTimeout(()=>c.abort(), ms);
  try{
    const r = await fetch(url, {signal:c.signal});
    if(!r.ok) throw new Error("HTTP "+r.status);
    return await r.json();
  } finally { clearTimeout(t); }
}
async function postJSON(url, body, ms=8000){
  const c = new AbortController();
  const t = setTimeout(()=>c.abort(), ms);
  try{
    const r = await fetch(url, {
      method:"POST", signal:c.signal,
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error("HTTP "+r.status);
    return await r.json();
  } finally { clearTimeout(t); }
}

const SOURCES = [
  { name:"adsb.lol",       url:(la,lo,r)=>`https://api.adsb.lol/v2/point/${la}/${lo}/${r}` },
  { name:"airplanes.live", url:(la,lo,r)=>`https://api.airplanes.live/v2/point/${la}/${lo}/${r}` },
  { name:"adsb.fi",        url:(la,lo,r)=>`https://opendata.adsb.fi/api/v2/lat/${la}/lon/${lo}/dist/${r}` }
];

async function fetchAircraft(){
  if(state.lat==null) return;
  const {lat, lon, radius} = state;

  const results = await Promise.allSettled(SOURCES.map(s => fetchJSON(s.url(lat,lon,radius))));
  const byHex = {};
  results.forEach((res,i)=>{
    const name = SOURCES[i].name;
    if(res.status==="fulfilled"){
      const list = res.value && (res.value.ac || res.value.aircraft) || [];
      state.diag[name] = `OK — ${list.length} aircraft`;
      for(const a of list){ if(a.hex && !byHex[a.hex]) byHex[a.hex]=a; }
    } else {
      state.diag[name] = "FAILED — " + (res.reason && res.reason.message || res.reason);
    }
  });

  const ac = Object.values(byHex)
    .filter(a => a.alt_baro !== "ground")
    .map(a => { if(a.dst==null && a.lat!=null && a.lon!=null) a.dst = nmBetween(lat,lon,a.lat,a.lon); return a; })
    .sort((a,b) => (a.dst??999)-(b.dst??999));

  const curHex = state.aircraft[state.shown] && state.aircraft[state.shown].hex;
  state.aircraft = ac;
  const keep = curHex ? ac.findIndex(x=>x.hex===curHex) : -1;
  state.shown = keep >= 0 ? keep : 0;
  updateDiag();
}

function updateDiag(){
  const lines = [];
  lines.push(`Position: ${state.lat!=null ? state.lat+", "+state.lon : "not set"}`);
  lines.push(`Radius: ${state.radius} nm (${Math.round(state.radius*1.15)} mi)`);
  for(const [k,v] of Object.entries(state.diag)) lines.push(`${k}: ${v}`);
  lines.push(`Merged: ${state.aircraft.length} airborne`);
  $("diag").textContent = lines.join("\n");
}

/* route lookup — position-aware first so a stale callsign→route mapping
   can't hand back the wrong routing or a merged multi-leg string */
async function getRoute(cs, lat, lon){
  const key = cs.trim();
  if(key in state.routeCache) return state.routeCache[key];
  state.routeCache[key] = null;

  try{
    const body = { planes:[{ callsign:key, lat: lat ?? 0, lng: lon ?? 0 }] };
    const r = await postJSON("https://api.adsb.lol/api/0/routeset", body, 7000);
    const entry = Array.isArray(r) ? (r.find(e=>e && e.plausible) || r[0]) : null;
    let codes = entry && (entry._airport_codes_iata || entry.airport_codes_iata);
    if(!codes && entry && Array.isArray(entry._airports) && entry._airports.length>=2){
      codes = entry._airports.map(ap=>ap.iata || ap.icao).join("-");
    }
    if(codes && codes.includes("-")){
      const legs = codes.split("-").filter(Boolean);
      if(legs.length>=2) state.routeCache[key] = `${legs[0]}-${legs[legs.length-1]}`;
    }
  }catch(e){}

  if(!state.routeCache[key]){
    try{
      const r = await fetchJSON(`https://hexdb.io/api/v1/route/icao/${key}`, 6000);
      if(r && r.route && r.route.includes("-")){
        const legs = r.route.split("-").filter(Boolean);
        const iata = await Promise.all(legs.map(icaoToIata));
        if(iata.length>=2) state.routeCache[key] = `${iata[0]}-${iata[iata.length-1]}`;
      }
    }catch(e){}
  }
  return state.routeCache[key];
}
async function icaoToIata(icao){
  if(state.airportCache[icao]) return state.airportCache[icao];
  try{
    const a = await fetchJSON(`https://hexdb.io/api/v1/airport/icao/${icao}`, 6000);
    if(a && a.iata){ state.airportCache[icao]=a.iata; return a.iata; }
  }catch(e){}
  state.airportCache[icao]=icao;
  return icao;
}

/* ================= render ================= */
function setNeedle(deg){
  $("needle").style.transform = `rotate(${deg||0}deg)`;
}
function setDots(n, activeIdx){
  const wrap = $("metaDots");
  wrap.innerHTML = "";
  const max = Math.min(n, 8);
  for(let i=0;i<max;i++){
    const d = document.createElement("span");
    if(i===activeIdx % max) d.classList.add("on");
    wrap.appendChild(d);
  }
}
function render(){
  const ac = state.aircraft;

  if(state.lat==null){
    $("airlineName").textContent = "Overhead";
    $("flightNo").style.display = "none";
    $("acType").textContent = "";
    $("route").style.display = "none";
    $("stats").style.display = "none";
    $("statusLine").style.display = "block";
    $("statusLine").className = "warn";
    $("statusLine").textContent = "Waiting for location — open settings to enter it";
    $("metaText").textContent = "No position set";
    setNeedle(0);
    setDots(0,0);
    return;
  }

  if(!ac.length){
    $("airlineName").textContent = "Sky's clear";
    $("flightNo").style.display = "none";
    $("acType").textContent = "";
    $("route").style.display = "none";
    $("stats").style.display = "none";
    $("statusLine").style.display = "block";
    $("statusLine").className = "";
    $("statusLine").textContent = `Nothing within ${state.radius} nm — scanning`;
    $("metaText").textContent = `${state.lat}, ${state.lon}`;
    setNeedle(0);
    setDots(0,0);
    return;
  }

  const a = ac[state.shown % ac.length];
  const cs = (a.flight||"").trim();
  const fno = flightNumber(cs) || a.r || (a.hex||"").toUpperCase();
  const accent = accentFor(cs);
  document.documentElement.style.setProperty("--accent", accent);

  $("statusLine").style.display = "none";
  $("route").style.display = "flex";
  $("stats").style.display = "flex";

  $("airlineName").textContent = airlineName(cs) || cs || a.r || (a.hex||"").toUpperCase();
  $("flightNo").style.display = "inline-block";
  $("flightNo").textContent = fno;
  $("acType").textContent = typeName(a.t) || "Unknown aircraft type";

  $("depApt").textContent = "···";
  $("arrApt").textContent = "···";
  if(cs){
    getRoute(cs, a.lat, a.lon).then(rt=>{
      const cur = state.aircraft[state.shown % state.aircraft.length];
      if(cur && (cur.flight||"").trim()===cs && rt){
        const [dep,arr] = rt.split("-");
        $("depApt").textContent = dep || "···";
        $("arrApt").textContent = arr || "···";
      } else if(cur && (cur.flight||"").trim()===cs){
        $("depApt").textContent = "····";
        $("arrApt").textContent = "····";
      }
    });
  }

  const alt = fmtAlt(a.alt_baro!=null ? a.alt_baro : a.alt_geom);
  const mph = a.gs!=null ? Math.round(a.gs*1.15078) : "--";
  const trk = a.track!=null ? Math.round(a.track) : null;
  const vrRaw = a.baro_rate!=null ? a.baro_rate : a.geom_rate;
  const vr = vrRaw!=null ? Math.round(vrRaw/60) : 0;

  $("altVal").innerHTML = `${alt}<span class="unit">ft</span>`;
  $("spdVal").innerHTML = `${mph}<span class="unit">mph</span>`;
  $("vsVal").innerHTML = `${vr>0?"+":""}${vr}<span class="unit">ft/s</span>`;
  $("dialLabel").textContent = trk!=null ? `Heading ${trk}°` : "Heading";
  setNeedle(trk);

  const dst = a.dst!=null ? a.dst.toFixed(1)+" nm away" : "";
  $("metaText").textContent = `${(state.shown % ac.length)+1} of ${ac.length} nearby${dst?" · "+dst:""}`;
  setDots(ac.length, state.shown);
}

function tickClock(){
  $("clock").textContent = new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

/* ================= loops ================= */
setInterval(async ()=>{ if(!state.paused){ await fetchAircraft(); render(); } }, 15000);
setInterval(()=>{
  if(state.aircraft.length>1 && !state.paused){
    state.shown = (state.shown+1) % state.aircraft.length;
    render();
  }
}, 8000);
setInterval(tickClock, 1000);

/* ================= location ================= */
function useGPS(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async pos=>{
    state.lat = +pos.coords.latitude.toFixed(4);
    state.lon = +pos.coords.longitude.toFixed(4);
    saveSetting("lat", state.lat); saveSetting("lon", state.lon);
    $("latlon").value = `${state.lat}, ${state.lon}`;
    await fetchAircraft(); render();
  }, err=>{
    if(state.lat!=null) return; // already running on saved coords
    const local = location.protocol === "file:";
    $("statusLine").style.display="block";
    $("statusLine").className="warn";
    $("statusLine").textContent = local
      ? "GPS needs https — enter coordinates once in settings, they'll be remembered"
      : "Location unavailable — enter coordinates in settings";
    updateDiag();
  }, {enableHighAccuracy:false, timeout:10000, maximumAge:600000});
}

/* ================= settings UI ================= */
const sheet = $("sheet"), overlay = $("overlay");
function openSheet(){ updateDiag(); sheet.classList.add("open"); overlay.classList.add("open"); }
function closeSheet(){ sheet.classList.remove("open"); overlay.classList.remove("open"); }
$("gearBtn").addEventListener("click", openSheet);
$("closeBtn").addEventListener("click", closeSheet);
overlay.addEventListener("click", closeSheet);
$("useGps").addEventListener("click", useGPS);
$("refreshBtn").addEventListener("click", async ()=>{ await fetchAircraft(); render(); updateDiag(); });
$("radius").addEventListener("input", e=>{
  state.radius = +e.target.value;
  $("radiusVal").textContent = state.radius+" nm";
});
$("radius").addEventListener("change", async ()=>{
  saveSetting("radius", state.radius);
  await fetchAircraft(); render();
});
$("latlon").addEventListener("change", async e=>{
  const m = e.target.value.match(/(-?\d+(\.\d+)?)[,\s]+(-?\d+(\.\d+)?)/);
  if(m){
    state.lat=+m[1]; state.lon=+m[3];
    saveSetting("lat", state.lat); saveSetting("lon", state.lon);
    await fetchAircraft(); render();
  }
});
$("fsBtn").addEventListener("click", ()=>{
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
});

/* keep tablet screen awake */
let wakeLock=null;
async function keepAwake(){ try{ if("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); }catch(e){} }
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") keepAwake(); });

/* ================= boot ================= */
keepAwake();
tickClock();
const savedLat = loadSetting("lat"), savedLon = loadSetting("lon"), savedR = loadSetting("radius");
if(savedR){ state.radius = savedR; $("radius").value = savedR; $("radiusVal").textContent = savedR+" nm"; }
if(savedLat!=null && savedLon!=null){
  state.lat = savedLat; state.lon = savedLon;
  $("latlon").value = `${savedLat}, ${savedLon}`;
  fetchAircraft().then(render);
}
useGPS();
render();
</script>
